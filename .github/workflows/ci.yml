name: ci

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      # the ui package embeds dist via go:embed, so the frontend builds
      # before anything compiles the full binary
      - name: build frontend
        run: |
          npm --prefix ui ci
          npm --prefix ui run build

      - name: ui tests
        run: npm --prefix ui test

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

      - name: headless build
        run: go build -tags no_ui -o /dev/null ./cmd/vane

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: fetch push ci scripts
        run: git clone --branch v0.2.1 --depth 1 https://github.com/michaelquigley/push.git _push

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: build frontend
        run: |
          npm --prefix ui ci
          npm --prefix ui run build

      - name: build stamped linux-amd64
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          LDFLAGS=$(_push/ci/ldflags.sh)
          go build -ldflags "${LDFLAGS}" -o vane ./cmd/vane

      - name: verify stamp
        run: |
          out=$(./vane version)
          if [ -z "${out}" ] || printf '%s\n' "${out}" | grep -F '[developer build]'; then
            printf '%s\n' "${out}"
            exit 1
          fi

      - name: package artifact
        run: tar -czf vane-linux-amd64.tar.gz vane CHANGELOG.md docs/current

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vane-linux-amd64
          path: vane-linux-amd64.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    steps:
      - name: download artifact
        uses: actions/download-artifact@v4
        with:
          name: vane-linux-amd64

      - name: name archive with ref tag
        run: mv vane-linux-amd64.tar.gz "vane-${{ github.ref_name }}-linux-amd64.tar.gz"

      - name: draft release
        uses: softprops/action-gh-release@v2
        with:
          files: vane-${{ github.ref_name }}-linux-amd64.tar.gz
          fail_on_unmatched_files: true
          draft: true
